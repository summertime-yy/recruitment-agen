<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能招聘智能体 · 交互原型</title>
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #e8e8e8;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; padding: 20px;
}
:root {
  --wechat-green: #07C160;
  --wechat-green-light: #e8f8ef;
  --bg-chat: #f5f5f5;
  --bg-sidebar: #2e2e2e;
  --text-primary: #191919;
  --text-secondary: #666;
  --text-muted: #999;
  --border: #e0e0e0;
  --white: #fff;
  --bubble-self: #95ec69;
  --bubble-other: #fff;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}

/* ============================================================
   LAYOUT
   ============================================================ */
.prototype-container {
  display: flex;
  width: 1100px; height: 750px;
  border-radius: 12px; overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  background: var(--white);
}

/* Sidebar */
.sidebar {
  width: 280px; background: var(--bg-sidebar); color: #ccc;
  display: flex; flex-direction: column;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 20px 16px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-header h2 {
  color: #fff; font-size: 15px; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.sidebar-header h2 .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--wechat-green);
  display: inline-block;
}
.sidebar-header .subtitle {
  font-size: 12px; color: #888; margin-top: 4px;
}
.sidebar-scenarios {
  flex: 1; overflow-y: auto; padding: 8px 0;
}
.scenario-group-title {
  font-size: 11px; color: #666; text-transform: uppercase;
  padding: 12px 16px 6px; letter-spacing: 0.5px;
}
.scenario-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; cursor: pointer;
  transition: all 0.15s; border-left: 3px solid transparent;
  font-size: 13px; color: #aaa;
}
.scenario-item:hover { background: rgba(255,255,255,0.05); color: #ddd; }
.scenario-item.active {
  background: rgba(7,193,96,0.12); color: var(--wechat-green);
  border-left-color: var(--wechat-green); font-weight: 500;
}
.scenario-item .icon {
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.scenario-item .icon.jd { background: rgba(7,193,96,0.2); }
.scenario-item .icon.resume { background: rgba(64,158,255,0.2); }
.scenario-item .icon.screening { background: rgba(230,162,60,0.2); }
.scenario-item .icon.progress { background: rgba(144,147,153,0.2); }
.scenario-item .icon.reset { background: rgba(245,108,108,0.2); }

.sidebar-footer {
  padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.08);
  font-size: 11px; color: #666;
}
.sidebar-footer .tag {
  display: inline-block; background: rgba(7,193,96,0.15); color: var(--wechat-green);
  padding: 2px 8px; border-radius: 10px; font-size: 10px; margin-right: 4px;
}

/* Chat Area */
.chat-area {
  flex: 1; display: flex; flex-direction: column;
  background: var(--bg-chat);
}
.chat-header {
  padding: 12px 20px; background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.chat-header .group-avatar {
  width: 36px; height: 36px; border-radius: 6px;
  background: linear-gradient(135deg, #07C160, #06ae56);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 16px; font-weight: bold;
}
.chat-header .group-info { flex: 1; }
.chat-header .group-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.chat-header .group-meta { font-size: 11px; color: var(--text-muted); }

/* Messages */
.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 6px;
}
.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

/* System Message */
.msg-system {
  text-align: center; font-size: 12px; color: var(--text-muted);
  padding: 4px 0; margin: 4px 0;
}

/* Chat Bubble */
.msg-row {
  display: flex; gap: 10px; max-width: 75%;
  animation: fadeInUp 0.3s ease-out;
}
.msg-row.self { align-self: flex-end; flex-direction: row-reverse; }
.msg-row.other { align-self: flex-start; }
.msg-avatar {
  width: 34px; height: 34px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #fff; flex-shrink: 0;
  font-weight: 700;
}
.msg-avatar.bot { background: var(--wechat-green); }
.msg-avatar.hr { background: #4a90d9; }
.msg-avatar.system-av { background: #999; font-size: 12px; }
.msg-bubble {
  background: var(--bubble-other); padding: 10px 14px;
  border-radius: 6px; font-size: 13px; line-height: 1.6;
  color: var(--text-primary); word-break: break-word;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  position: relative;
}
.msg-row.self .msg-bubble {
  background: var(--bubble-self);
}
.msg-sender {
  font-size: 11px; color: var(--text-muted); margin-bottom: 4px;
}

/* Message Cards (from bot) */
.msg-card {
  background: var(--white); border-radius: 8px;
  padding: 16px; border: 1px solid var(--border);
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.msg-card h3 {
  font-size: 14px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.msg-card .card-section { margin-bottom: 10px; }
.msg-card .card-section:last-child { margin-bottom: 0; }
.msg-card .section-title {
  font-size: 12px; font-weight: 600; color: var(--text-secondary);
  margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px;
}
.msg-card .skill-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.msg-card .skill-tag {
  background: #e8f5e9; color: #2e7d32;
  padding: 2px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 500;
}
.msg-card ul { padding-left: 16px; font-size: 13px; }
.msg-card ul li { margin-bottom: 3px; }
.msg-card .hint {
  font-size: 11px; color: var(--text-muted); margin-top: 8px;
  padding-top: 8px; border-top: 1px dashed #e0e0e0;
}
.msg-card table { width: 100%; font-size: 12px; border-collapse: collapse; }
.msg-card table td, .msg-card table th {
  padding: 4px 8px; border-bottom: 1px solid #f0f0f0; text-align: left;
}
.msg-card table th { color: var(--text-secondary); font-weight: 500; }
.msg-card .score-bar {
  height: 6px; border-radius: 3px; background: #e0e0e0;
  margin-top: 2px; position: relative;
}
.msg-card .score-bar-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--wechat-green), #4caf50);
}
.msg-card .highlight { color: var(--wechat-green); font-weight: 600; }
.msg-card .highlight-del { color: #e53935; text-decoration: line-through; background: #ffebee; padding: 1px 4px; border-radius: 2px; }
.msg-card .highlight-add { color: #2e7d32; background: #e8f5e9; padding: 1px 4px; border-radius: 2px; font-weight: 600; }

/* Analysis Card */
.analysis-block {
  background: #f8fdf9; border: 1px solid #d4edda; border-radius: 6px; padding: 12px;
  margin-bottom: 10px;
}
.analysis-block .analysis-item {
  display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px;
  font-size: 12px; line-height: 1.5;
}
.analysis-block .analysis-item:last-child { margin-bottom: 0; }
.analysis-block .analysis-icon {
  font-size: 14px; flex-shrink: 0; width: 20px; text-align: center;
}
.analysis-block .analysis-label { color: var(--text-secondary); font-weight: 500; white-space: nowrap; }
.analysis-block .analysis-value { color: var(--text-primary); }
.analysis-keywords { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
.analysis-keyword {
  background: #e8f5e9; color: #2e7d32; padding: 1px 8px;
  border-radius: 10px; font-size: 10px; font-weight: 500;
}

/* Position Picker */
.position-picker {
  display: flex; flex-direction: column; gap: 6px; margin-top: 8px;
}
.position-picker .pos-option {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer; transition: all 0.15s;
}
.position-picker .pos-option:hover { border-color: var(--wechat-green); background: #f9fdf9; }
.position-picker .pos-option .pos-radio {
  width: 18px; height: 18px; border-radius: 50%; border: 2px solid #ccc;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.position-picker .pos-option .pos-radio.selected {
  border-color: var(--wechat-green); background: var(--wechat-green);
}
.position-picker .pos-option .pos-radio.selected::after {
  content: ''; width: 6px; height: 6px; border-radius: 50%; background: #fff;
}
.position-picker .pos-info { flex: 1; }
.position-picker .pos-name { font-size: 13px; font-weight: 500; }
.position-picker .pos-meta { font-size: 11px; color: var(--text-muted); }
.position-picker .pos-count {
  font-size: 11px; color: var(--wechat-green); font-weight: 500;
  background: #e8f8ef; padding: 2px 8px; border-radius: 10px;
}

/* Modification Summary Card */
.mod-summary { 
  background: #fff8e1; border: 1px solid #ffe082; border-radius: 8px;
  padding: 12px; margin-bottom: 12px; font-size: 12px;
}
.mod-summary .mod-title { font-weight: 600; margin-bottom: 6px; color: #f57f17; }
.mod-summary .mod-item { margin-bottom: 3px; padding-left: 12px; }
.msg-card .rank-badge {
  display: inline-block; width: 22px; height: 22px; border-radius: 50%;
  text-align: center; line-height: 22px; font-size: 12px; font-weight: 700;
  margin-right: 6px; color: #fff;
}
.msg-card .rank-badge.r1 { background: #ff6b35; }
.msg-card .rank-badge.r2 { background: #4a90d9; }
.msg-card .rank-badge.r3 { background: #07C160; }

/* File Message */
.msg-file {
  display: flex; align-items: center; gap: 10px;
  background: var(--white); padding: 10px 14px;
  border-radius: 6px; border: 1px solid var(--border);
  cursor: default;
}
.msg-file .file-icon {
  width: 36px; height: 36px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.msg-file .file-icon.pdf { background: #fdecea; color: #d32f2f; }
.msg-file .file-icon.word { background: #e3f2fd; color: #1976d2; }
.msg-file .file-info { flex: 1; min-width: 0; }
.msg-file .file-name { font-size: 12px; font-weight: 500; color: var(--text-primary); }
.msg-file .file-size { font-size: 11px; color: var(--text-muted); }

/* Typing Indicator */
.typing-indicator {
  display: flex; gap: 4px; padding: 8px 14px;
}
.typing-indicator span {
  width: 7px; height: 7px; border-radius: 50%; background: #999;
  animation: typingBounce 1.2s infinite ease-in-out;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

/* Input Bar */
.chat-input-area {
  background: var(--white); border-top: 1px solid var(--border);
  padding: 10px 16px;
}
.chat-input-toolbar {
  display: flex; gap: 12px; margin-bottom: 8px;
}
.chat-input-toolbar button {
  background: none; border: none; font-size: 20px;
  cursor: pointer; padding: 4px; border-radius: 4px;
  transition: background 0.15s; color: #666;
}
.chat-input-toolbar button:hover { background: #f0f0f0; }
.chat-input-row {
  display: flex; gap: 10px; align-items: flex-end;
}
.chat-input-row textarea {
  flex: 1; border: 1px solid var(--border); border-radius: 6px;
  padding: 8px 12px; font-size: 13px; resize: none;
  font-family: inherit; line-height: 1.5; outline: none;
  max-height: 80px; min-height: 36px;
  transition: border-color 0.15s;
}
.chat-input-row textarea:focus { border-color: var(--wechat-green); }
.btn-send {
  background: var(--wechat-green); color: #fff; border: none;
  padding: 8px 20px; border-radius: 6px; font-size: 13px;
  font-weight: 500; cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
}
.btn-send:hover { background: #06ae56; }
.btn-send:disabled { background: #ccc; cursor: not-allowed; }
.btn-send.thinking { animation: pulse 1s infinite; }

/* Quick Actions */
.quick-actions {
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px;
}
.quick-actions button {
  background: #f5f5f5; border: 1px solid #e0e0e0;
  padding: 4px 12px; border-radius: 14px; font-size: 11px;
  cursor: pointer; transition: all 0.15s; color: #666;
  white-space: nowrap;
}
.quick-actions button:hover {
  background: var(--wechat-green-light); border-color: var(--wechat-green);
  color: var(--wechat-green);
}
.quick-actions button.primary-action {
  background: var(--wechat-green); color: #fff; border-color: var(--wechat-green);
  font-weight: 500;
}

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 10px 24px;
  border-radius: 20px; font-size: 13px; z-index: 999;
  animation: toastIn 0.3s ease-out;
  pointer-events: none;
}

/* Walkthrough Overlay */
.walkthrough-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 10;
  display: flex; align-items: center; justify-content: center;
}
.walkthrough-card {
  background: var(--white); border-radius: 12px;
  padding: 24px; width: 360px; text-align: center;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
  animation: fadeInUp 0.4s ease-out;
}
.walkthrough-card h3 { font-size: 17px; margin-bottom: 8px; }
.walkthrough-card p { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.6; }
.walkthrough-card .step-indicator {
  display: flex; gap: 6px; justify-content: center; margin-bottom: 16px;
}
.walkthrough-card .step-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #ddd;
}
.walkthrough-card .step-dot.done { background: var(--wechat-green); }
.walkthrough-card .step-dot.current { background: var(--wechat-green); box-shadow: 0 0 0 3px rgba(7,193,96,0.3); }
.walkthrough-card .btn-walkthrough {
  background: var(--wechat-green); color: #fff; border: none;
  padding: 10px 28px; border-radius: 20px; font-size: 14px;
  cursor: pointer; font-weight: 500;
}
.walkthrough-card .btn-skip {
  background: none; border: none; color: var(--text-muted);
  font-size: 12px; cursor: pointer; margin-top: 10px;
}

/* File upload modal */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4); z-index: 100;
  display: flex; align-items: center; justify-content: center;
}
.modal-content {
  background: var(--white); border-radius: 12px; padding: 24px;
  width: 400px; box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}
.modal-content h3 { font-size: 16px; margin-bottom: 12px; }
.modal-files { display: flex; flex-direction: column; gap: 8px; }
.modal-file-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
  transition: all 0.15s;
}
.modal-file-item:hover { border-color: var(--wechat-green); background: #f9fdf9; }
.modal-file-item .fi-icon {
  width: 32px; height: 32px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.modal-file-item .fi-icon.pdf-bg { background: #fdecea; color: #d32f2f; }
.modal-file-item .fi-icon.word-bg { background: #e3f2fd; color: #1976d2; }
.modal-file-item .fi-icon.img-bg { background: #fff3e0; color: #f57c00; }
.modal-file-item .fi-info { flex: 1; }
.modal-file-item .fi-name { font-size: 13px; font-weight: 500; }
.modal-file-item .fi-meta { font-size: 11px; color: var(--text-muted); }

/* Animations */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes typingBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}
</style>
</head>
<body>

<div class="prototype-container" id="prototype">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2><span class="dot"></span>智能招聘智能体</h2>
      <div class="subtitle">MVP 交互原型 · v1.2</div>
    </div>
    <div class="sidebar-scenarios">
      <div class="scenario-group-title">🧪 体验场景</div>
      <div class="scenario-item active" data-scenario="jd" onclick="switchScenario('jd')">
        <div class="icon jd">📋</div>
        <div>场景一：生成岗位JD</div>
      </div>
      <div class="scenario-item" data-scenario="resume" onclick="switchScenario('resume')">
        <div class="icon resume">📄</div>
        <div>场景二：简历解析</div>
      </div>
      <div class="scenario-item" data-scenario="screening" onclick="switchScenario('screening')">
        <div class="icon screening">🌟</div>
        <div>场景三：AI筛选评分</div>
      </div>
      <div class="scenario-item" data-scenario="progress" onclick="switchScenario('progress')">
        <div class="icon progress">📊</div>
        <div>场景四：进度查询</div>
      </div>
      <div class="scenario-group-title" style="margin-top:8px">🔄 操作</div>
      <div class="scenario-item" onclick="resetAll()">
        <div class="icon reset">↺</div>
        <div>重置原型</div>
      </div>
    </div>
    <div class="sidebar-footer">
      <span class="tag">MVP</span>
      <span class="tag">桌面端</span>
      <span class="tag">企微@机器人</span>
    </div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area" id="chatArea">
    <div class="chat-header">
      <div class="group-avatar">HR</div>
      <div class="group-info">
        <div class="group-name">HR招聘协作群</div>
        <div class="group-meta">3人群 · 含招聘助手</div>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <div class="chat-input-toolbar">
        <button title="表情" onclick="showToast('功能开发中')">😀</button>
        <button title="文件" onclick="showFilePicker()">📎</button>
        <button title="截图" onclick="showToast('功能开发中')">✂️</button>
        <button title="@提及" onclick="insertMention()">@</button>
      </div>
      <div class="chat-input-row">
        <textarea id="chatInput" placeholder="输入消息，或 @招聘助手 + 你的需求..." rows="1" onkeydown="handleKeydown(event)"></textarea>
        <button class="btn-send" id="btnSend" onclick="sendMessage()">发送</button>
      </div>
      <div class="quick-actions" id="quickActions"></div>
    </div>
  </div>
</div>

<!-- File Picker Modal -->
<div class="modal-overlay" id="fileModal" style="display:none" onclick="if(event.target===this) closeFilePicker()">
  <div class="modal-content">
    <h3>📎 选择简历文件发送</h3>
    <p style="font-size:12px;color:#999;margin-bottom:12px">模拟文件上传 · 点击即可发送</p>
    <div class="modal-files" id="fileList"></div>
    <button onclick="closeFilePicker()" style="margin-top:12px;width:100%;padding:8px;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:6px;cursor:pointer;font-size:13px">取消</button>
  </div>
</div>

<!-- Walkthrough overlay -->
<div class="walkthrough-overlay" id="walkthrough" style="display:none">
  <div class="walkthrough-card">
    <div style="font-size:48px;margin-bottom:8px" id="walkEmoji">👋</div>
    <h3 id="walkTitle">欢迎体验</h3>
    <p id="walkDesc">这是一个交互原型，模拟HR在企微群中通过 @招聘助手 完成招聘流程。</p>
    <div class="step-indicator">
      <div class="step-dot done"></div>
      <div class="step-dot current"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>
    <button class="btn-walkthrough" id="walkBtn" onclick="nextWalkStep()">开始体验</button>
    <br>
    <button class="btn-skip" onclick="skipWalkthrough()">跳过引导，自由体验</button>
  </div>
</div>

<script>
/* ============================================================
   STATE MANAGEMENT
   ============================================================ */
const state = {
  currentScenario: 'jd',

/* ============================================================

   ============================================================ */
function addSystemMsg(text) {
  state.messages.push({ type:'system', text });
  renderMessages();
}

function addUserMsg(text) {
  state.messages.push({ type:'user', text });
  renderMessages();
  scrollToBottom();
}

function addUserFile(file) {
  state.messages.push({ type:'user_file', file });
  renderMessages();
  scrollToBottom();
}

function addBotCard(cardHTML) {
  state.messages.push({ type:'bot_card', html: cardHTML });
  renderMessages();
  scrollToBottom();
}

function addBotMsg(text) {
  state.messages.push({ type:'bot_text', text });
  renderMessages();
  scrollToBottom();
}

function renderMessages() {
  const container = document.getElementById('chatMessages');
  let html = '';
  let lastTime = '';
  state.messages.forEach((msg, idx) => {
    // Time divider (simplified)
    
    if (msg.type === 'system') {
      html += `<div class="msg-system">${msg.text}</div>`;
    } else if (msg.type === 'user') {
      html += `
        <div class="msg-row self">
          <div class="msg-avatar hr">HR</div>
          <div>
            <div class="msg-sender">杨经理 (HR)</div>
            <div class="msg-bubble">${msg.text}</div>
          </div>
        </div>`;
    } else if (msg.type === 'user_file') {
      const fi = msg.file;
      const iconClass = fi.type === 'pdf' ? 'pdf' : fi.type === 'word' ? 'word' : 'img';
      const iconEmoji = fi.type === 'pdf' ? '📕' : fi.type === 'word' ? '📘' : '🖼️';
      html += `
        <div class="msg-row self">
          <div class="msg-avatar hr">HR</div>
          <div>
            <div class="msg-sender">杨经理 (HR)</div>
            <div class="msg-file">
              <div class="file-icon ${iconClass}">${iconEmoji}</div>
              <div class="file-info">
                <div class="file-name">${fi.name}</div>
                <div class="file-size">${fi.size}</div>
              </div>
            </div>
          </div>
        </div>`;
    } else if (msg.type === 'bot_card') {
      html += `
        <div class="msg-row other">
          <div class="msg-avatar bot">招</div>
          <div>
            <div class="msg-sender">招聘助手</div>
            <div class="msg-card">${msg.html}</div>
          </div>
        </div>`;
    } else if (msg.type === 'bot_text') {
      html += `
        <div class="msg-row other">
          <div class="msg-avatar bot">招</div>
          <div>
            <div class="msg-sender">招聘助手</div>
            <div class="msg-bubble">${msg.text}</div>
          </div>
        </div>`;
    }
  });
  container.innerHTML = html;
  scrollToBottom();
}

function scrollToBottom() {
  const container = document.getElementById('chatMessages');
  setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
}

function showTyping(callback, delay=1500) {
  const container = document.getElementById('chatMessages');
  const typingHTML = `
    <div class="msg-row other" id="typingIndicator">
      <div class="msg-avatar bot">招</div>
      <div>
        <div class="msg-sender">招聘助手</div>
        <div class="msg-bubble">
          <div class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </div>`;
  container.insertAdjacentHTML('beforeend', typingHTML);
  scrollToBottom();
  disableInput(true);
  setTimeout(() => {
    const ti = document.getElementById('typingIndicator');
    if (ti) ti.remove();
    disableInput(false);
    if (callback) callback();
  }, delay);
}

function disableInput(disabled) {
  document.getElementById('chatInput').disabled = disabled;
  const btn = document.getElementById('btnSend');
  btn.disabled = disabled;
  if (disabled) btn.classList.add('thinking');
  else btn.classList.remove('thinking');
}

function updateQuickActions(actions) {
  const qa = document.getElementById('quickActions');
  qa.innerHTML = actions.map(a => 
    `<button class="${a.primary ? 'primary-action' : ''}" onclick="${a.onclick}">${a.label}</button>`
  ).join('');
}

function modifyJD(userModText) {
  const modText = userModText || '工作地点改为深圳，招聘人数改为1人';
  
  // Parse the modification to determine what changed
  // (in production this would be LLM-parsed; here we simulate)
  let locationChange = null, countChange = null, skillAdd = null, skillRemove = null;
  let otherChanges = [];
  
  if (/深圳/i.test(modText)) { locationChange = '深圳'; otherChanges.push('工作地点：上海 → 深圳'); }
  if (/北京/i.test(modText)) { locationChange = '北京'; otherChanges.push('工作地点：上海 → 北京'); }
  if (/1人|一个|一人|调整为1/i.test(modText)) { countChange = '1人'; otherChanges.push('招聘人数：2人 → 1人'); }
  if (/3人|三个|三人/i.test(modText)) { countChange = '3人'; otherChanges.push('招聘人数：2人 → 3人'); }
  if (/fpga|FPGA/i.test(modText)) { skillAdd = 'FPGA验证经验'; otherChanges.push('加分项新增：FPGA验证经验'); }
  if (/硕士/i.test(modText) && !/博士/i.test(modText)) { otherChanges.push('学历要求更新：本科及以上 → 硕士及以上'); }
  if (/博士/i.test(modText)) { otherChanges.push('学历要求更新：本科及以上 → 博士优先'); }
  if (/去掉.*python|不要.*python|移除.*python/i.test(modText)) { skillRemove = 'Python'; otherChanges.push('加分项移除：Python/Perl脚本开发'); }
  
  if (otherChanges.length === 0) {
    // Generic modification - show understanding but note no specific fields matched
    otherChanges.push('根据描述微调JD措辞和表述');
  }
  
  showTyping(() => {
    // Show modification understanding summary
    const modSummaryHTML = `
      <div class="mod-summary">

      '了解 DFT 或低功耗设计验证',
    ];

    if (skillRemove) bonusItems = bonusItems.filter(i => !i.includes(skillRemove));
    
    // Apply education change
    let eduReq = '本科及以上学历，电子/计算机/微电子相关专业';
    if (/硕士/.test(modText) && !/博士/.test(modText)) eduReq = '<span class="highlight-del">本科</span><span class="highlight-add">硕士</span>及以上学历，电子/计算机/微电子相关专业';
    if (/博士/.test(modText)) eduReq = '博士优先，电子/计算机/微电子相关专业 <span class="highlight-add">← 已更新</span>';
    
    const jdCard = `

      ${modSummaryHTML}
      <div class="card-section">

function showFilePicker() {
  const modal = document.getElementById('fileModal');
  const list = document.getElementById('fileList');
  
  const available = demoResumes.filter(r => 
    !state.parsedResumes.find(pr => pr.name === r.name)
  );
  
  list.innerHTML = available.map(r => {
    const iconBg = r.type === 'pdf' ? 'pdf-bg' : 'word-bg';
    const iconEmoji = r.type === 'pdf' ? '📕' : '📘';
    return `
      <div class="modal-file-item" onclick="uploadResume('${r.name}')">
        <div class="fi-icon ${iconBg}">${iconEmoji}</div>
        <div class="fi-info">
          <div class="fi-name">${r.file}</div>
          <div class="fi-meta">${r.size} · ${r.type === 'pdf' ? 'PDF文档' : 'Word文档'}</div>
        </div>
      </div>`;
  }).join('');
  
  if (available.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:#999;padding:20px">所有演示简历已发送完毕</p>';
  }
  
  modal.style.display = 'flex';
}

function closeFilePicker() {
  document.getElementById('fileModal').style.display = 'none';
}

  closeFilePicker();
  const resume = demoResumes.find(r => r.name === name);
  if (!resume) return;
  
  addUserFile({ name: resume.file, size: resume.size, type: resume.type });
  
  showTyping(() => {
    const p = resume.parse;
    
    // Store pending resume data
    state.pendingResume = { name: p.name, data: p, file: resume };
    
    // Show parsed result + ask which position to associate

function assignResumeToJob(jobId, jobTitle) {
  if (!state.pendingResume) return;
  
  const p = state.pendingResume.data;
  
  // Add to parsed resumes
  state.parsedResumes.push({ name: p.name, data: p, jobId: jobId, jobTitle: jobTitle });
  state.resumeCount = state.parsedResumes.length;
  
  // Update job resume count
  const job = state.activeJobs.find(j => j.id === jobId);
  if (job) job.resumeCount = (job.resumeCount || 0) + 1;
  
  state.pendingResume = null;
  
  addUserMsg(`关联到【${jobTitle}】`);
  
  showTyping(() => {
    addBotMsg(`✅ 已将 <strong>${p.name}</strong> 的简历关联到岗位【${jobTitle}】

📊 该岗位当前已收集 <strong>${job.resumeCount}</strong> 份简历。`);

/* ============================================================
   INPUT HANDLING
   ============================================================ */
function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  
  // Intent recognition (simplified)
  const lower = text.toLowerCase();
  
  if (lower.includes('@招聘助手') || lower.includes('@招聘机器人') || lower.includes('@recruit')) {
    const content = text.replace(/@招聘助手|@招聘机器人|@recruit/gi, '').trim();
    
    if (/招|jd|岗位|招聘|hire/i.test(content)) {
      flowJDGeneration(text);
    } else if (/筛选|打分|评分|看看这批/i.test(content)) {
      triggerScreening();
    } else if (/进度|情况|怎么样|多少份/i.test(content)) {
      queryProgress();
    } else if (/查看.*详情|.*评分.*$/i.test(content)) {
      const nameMatch = content.match(/查看\s*(.+?)\s*(的)?(详情|评分)/);
      if (nameMatch) viewDetail(nameMatch[1].trim());
      else addUserMsg(text);
    } else if (/确认|ok|就这样|没问题/i.test(content)) {
      confirmJD();
    } else if (/修改|改成|加上|去掉/i.test(content)) {
      modifyJD(content);
    } else {
      // Fallback
      addUserMsg(text);
      showTyping(() => {
        addBotMsg(`🤔 抱歉，我没理解您的意思。我可以帮您：
• <strong>生成JD</strong> — 输入"帮我招一个[岗位]"
• <strong>提交简历</strong> — 直接发送简历文件或粘贴文本
• <strong>筛选简历</strong> — 输入"开始筛选"
• <strong>查询进度</strong> — 输入"进度"
💡 或者直接描述您想做什么，我尽力理解。`);
      }, 1000);
    }
  } else {
    // Regular chat message
    addUserMsg(text);
  }
}

      }, 1200);
      return;
    }
  }
});

function formatSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1048576) return (bytes/1024).toFixed(0) + 'KB';
  return (bytes/1048576).toFixed(1) + 'MB';
}

  const dots = overlay.querySelectorAll('.step-dot');
  dots.forEach((dot, i) => {
    dot.classList.remove('done', 'current');
    if (i < state.walkStep) dot.classList.add('done');
    else if (i === state.walkStep) dot.classList.add('current');
  });
  
  overlay.style.display = 'flex';
}

function nextWalkStep() {
  const scenarios = ['jd', 'resume', 'screening', 'progress'];
  state.walkStep++;
  
  if (state.walkStep >= 4) {
    skipWalkthrough();
    return;
  }
  
  // Load the corresponding scenario
  switchScenario(scenarios[state.walkStep - 1]);
  showWalkStep();
}

function skipWalkthrough() {
  state.walkActive = false;
  document.getElementById('walkthrough').style.display = 'none';
  switchScenario('jd');
}

/* ============================================================
   RESET
   ============================================================ */
function resetAll(showToastFlag = true) {
  state.jobConfirmed = false;
  state.resumeCount = 0;
  state.parsedResumes = [];
  state.screeningDone = false;
  state.messages = [];
  state.activeJobs = [];
  state.currentJobId = null;
  state.pendingResume = null;
  state.nextJobId = 1;
  renderMessages();
  updateQuickActions([]);
  document.getElementById('chatInput').value = '';
  
  if (showToastFlag) {
    showToast('原型已重置');
    switchScenario('jd');
  }
}

/* ============================================================
   UTILS
   ============================================================ */
function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

/* ============================================================
   INIT
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
  startWalkthrough();
});

// Keyboard shortcut: Ctrl+Enter to send
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'Enter') {
    sendMessage();
  }
});
</script>
